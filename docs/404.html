<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — IdeaPitch</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #ffffff; color: #1f2328; font-family: -apple-system, system-ui, sans-serif; font-size: 14px; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #24292f; border-bottom: 1px solid #30363d; padding: 0 1.5rem; height: 56px; display: flex; align-items: center; }
    .logo { font-size: 1rem; font-weight: 700; color: #ffffff; letter-spacing: -0.3px; text-decoration: none; }
    .logo span { color: #58a6ff; }
    .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; gap: 1rem; }
    .code { font-size: 4rem; font-weight: 700; color: #d0d7de; line-height: 1; }
    h1 { font-size: 1.2rem; font-weight: 600; color: #1f2328; }
    p { font-size: 0.88rem; color: #656d76; line-height: 1.6; max-width: 340px; }
    .btn { display: inline-block; margin-top: 0.5rem; background: #238636; color: #fff; border: none; padding: 0.5rem 1.2rem; font-family: inherit; font-weight: 600; font-size: 0.82rem; cursor: pointer; border-radius: 6px; text-decoration: none; transition: background 0.15s; }
    .btn:hover { background: #2ea043; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/">idea<span>pitch</span></a>
  </header>
  <div class="content">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a class="btn" href="/">← Back to ideas</a>
  </div>
</body>
</html>
