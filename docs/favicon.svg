<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#79c0ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bulbGrad" cx="35%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#ddf4ff"/>
      <stop offset="40%" stop-color="#79c0ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </radialGradient>
    <radialGradient id="shineGrad" cx="30%" cy="25%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" fill="#24292f"/>

  <!-- Soft glow behind bulb -->
  <ellipse cx="256" cy="210" rx="155" ry="145" fill="url(#glow)"/>

  <!-- Bulb glass body -->
  <path d="
    M 256 72
    C 162 72 100 142 100 218
    C 100 272 128 316 172 344
    L 172 346
    C 172 346 176 368 180 374
    L 332 374
    C 336 368 340 346 340 346
    L 340 344
    C 384 316 412 272 412 218
    C 412 142 350 72 256 72 Z
  " fill="url(#bulbGrad)"/>

  <!-- Shine overlay -->
  <path d="
    M 256 72
    C 162 72 100 142 100 218
    C 100 272 128 316 172 344
    L 172 346
    C 172 346 176 368 180 374
    L 332 374
    C 336 368 340 346 340 346
    L 340 344
    C 384 316 412 272 412 218
    C 412 142 350 72 256 72 Z
  " fill="url(#shineGrad)"/>

  <!-- Filament V shape -->
  <polyline points="220,310 256,250 292,310" stroke="white" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Base connector -->
  <rect x="180" y="374" width="152" height="26" rx="6" fill="#388bfd"/>

  <!-- Ridge 1 -->
  <rect x="188" y="404" width="136" height="22" rx="11" fill="#2f81f7"/>

  <!-- Ridge 2 -->
  <rect x="200" y="430" width="112" height="20" rx="10" fill="#1f6feb"/>

  <!-- Ridge 3 -->
  <rect x="214" y="454" width="84" height="18" rx="9" fill="#1158c7"/>

  <!-- Bottom tip -->
  <rect x="228" y="476" width="56" height="14" rx="7" fill="#0d419d"/>
</svg>
